# =============================================================================
# Sub2API Docker Compose - Source Build Override
# =============================================================================
# Use this file to build the Sub2API image from local source code instead of
# pulling the pre-built image from Docker Hub.
#
# Usage:
#   cd /opt/sub2api/deploy
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# This file overrides the sub2api service image to build from the Dockerfile
# located in the parent directory (project root).
# =============================================================================

services:
  sub2api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-}
        - COMMIT=${COMMIT:-docker}
        - DATE=${DATE:-}
    image: sub2api:local
    pull_policy: never
