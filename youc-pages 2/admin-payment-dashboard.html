<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>支付概览 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header id="topbar"></header>
    <div class="content">
      <div class="page-head"><div><h1>支付概览</h1><p>收入、订单与支付渠道分析</p></div>
        <button class="btn btn-sm">本月 ▾</button></div>
      <div class="stats" style="margin-bottom:22px">
        <div class="stat"><div class="n">¥48.2K</div><div class="l">本月收入</div><div class="d up">↑ 19%</div></div>
        <div class="stat"><div class="n">612</div><div class="l">支付订单</div><div class="d up">↑ 12%</div></div>
        <div class="stat"><div class="n">¥78.8</div><div class="l">客单价</div></div>
        <div class="stat"><div class="n">2.1%</div><div class="l">退款率</div><div class="d down">↓ 0.3%</div></div>
      </div>
      <div class="grid-2">
        <div class="card card-pad"><div class="section-title" style="margin-top:0">收入趋势</div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:170px;border-bottom:2.5px solid var(--line)">
            <div style="flex:1;background:var(--accent2);border:2.5px solid var(--line);height:40%"></div>
            <div style="flex:1;background:var(--accent2);border:2.5px solid var(--line);height:55%"></div>
            <div style="flex:1;background:var(--accent2);border:2.5px solid var(--line);height:48%"></div>
            <div style="flex:1;background:var(--accent2);border:2.5px solid var(--line);height:70%"></div>
            <div style="flex:1;background:var(--accent2);border:2.5px solid var(--line);height:62%"></div>
            <div style="flex:1;background:var(--accent);border:2.5px solid var(--line);height:88%"></div>
          </div></div>
        <div class="card card-pad"><div class="section-title" style="margin-top:0">支付渠道占比</div>
          <div class="kv"><span>微信支付</span><b>44%</b></div><div class="bar" style="margin-bottom:10px"><span style="width:44%"></span></div>
          <div class="kv"><span>支付宝</span><b>33%</b></div><div class="bar" style="margin-bottom:10px"><span style="width:33%"></span></div>
          <div class="kv"><span>Stripe</span><b>15%</b></div><div class="bar" style="margin-bottom:10px"><span style="width:15%"></span></div>
          <div class="kv"><span>余额 / 其他</span><b>8%</b></div><div class="bar"><span style="width:8%"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>window.PAGE={shell:'admin',active:'/admin/orders/dashboard',title:'支付概览',idx:'ADMIN / PAYMENT DASHBOARD'}</script>
<script src="assets/shell.js"></script>
</body>
</html>
