<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>用户管理 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header id="topbar"></header>
    <div class="content">
      <div class="page-head"><div><h1>用户管理</h1><p>管理平台用户、余额与权限</p></div>
        <button class="btn btn-acc" data-open="newUser">+ 新建用户</button></div>
      <div class="toolbar">
        <input class="input" style="max-width:240px" placeholder="搜索邮箱 / UID…">
        <select class="select" style="max-width:140px"><option>全部角色</option><option>管理员</option><option>普通用户</option></select>
        <select class="select" style="max-width:140px"><option>全部状态</option><option>正常</option><option>禁用</option></select>
        <button class="btn btn-fill">筛选</button>
      </div>
      <div class="table-wrap"><table class="table">
        <thead><tr><th><input type="checkbox"></th><th>UID</th><th>邮箱</th><th>角色</th><th>余额</th><th>密钥数</th><th>状态</th><th>注册时间</th><th></th></tr></thead>
        <tbody>
          <tr><td><input type="checkbox"></td><td class="mono">8842</td><td>dev@youc.io</td><td><span class="badge b-mute">用户</span></td><td class="mono">¥86.40</td><td class="mono">5</td><td><span class="badge b-on">正常</span></td><td class="mono">2026-03-01</td>
            <td><div class="dropdown"><button class="btn btn-sm" data-menu>•••</button><div class="menu"><a data-open="balance">调整余额</a><a>编辑</a><a>重置密码</a><a>查看密钥</a><div class="sep"></div><a class="danger">禁用</a></div></div></td></tr>
          <tr><td><input type="checkbox"></td><td class="mono">8821</td><td>admin@youc.io</td><td><span class="badge b-on">管理员</span></td><td class="mono">¥0.00</td><td class="mono">2</td><td><span class="badge b-on">正常</span></td><td class="mono">2026-01-12</td>
            <td><div class="dropdown"><button class="btn btn-sm" data-menu>•••</button><div class="menu"><a data-open="balance">调整余额</a><a>编辑</a><a>重置密码</a><div class="sep"></div><a class="danger">禁用</a></div></div></td></tr>
          <tr><td><input type="checkbox"></td><td class="mono">8790</td><td>spam@x.io</td><td><span class="badge b-mute">用户</span></td><td class="mono">¥0.00</td><td class="mono">0</td><td><span class="badge b-danger">已禁用</span></td><td class="mono">2026-05-30</td>
            <td><div class="dropdown"><button class="btn btn-sm" data-menu>•••</button><div class="menu"><a>启用</a><a>编辑</a><div class="sep"></div><a class="danger">删除</a></div></div></td></tr>
        </tbody>
      </table></div>
      <div class="pager"><a>‹</a><span class="cur">1</span><a>2</a><a>3</a><a>…</a><a>43</a><a>›</a></div>
    </div>
  </div>
</div>
<div class="overlay" id="newUser"><div class="modal">
  <div class="modal-head"><h3>新建用户</h3><span class="modal-x" data-close>×</span></div>
  <div class="modal-body">
    <label class="field"><span class="label">邮箱</span><input class="input" type="email"></label>
    <label class="field"><span class="label">初始密码</span><input class="input" type="password"></label>
    <label class="field"><span class="label">角色</span><select class="select"><option>普通用户</option><option>管理员</option></select></label>
    <label class="field"><span class="label">初始余额 (¥)</span><input class="input" value="0"></label>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" data-close>取消</button><button class="btn btn-acc" data-close data-toast="ok" data-toast-title="用户已创建">创建</button></div>
</div></div>
<div class="overlay" id="balance"><div class="modal">
  <div class="modal-head"><h3>调整余额</h3><span class="modal-x" data-close>×</span></div>
  <div class="modal-body">
    <div class="kv"><span class="k">当前余额</span><b>¥86.40</b></div>
    <label class="field" style="margin-top:14px"><span class="label">操作</span><select class="select"><option>充值 (+)</option><option>扣减 (−)</option><option>设为指定值</option></select></label>
    <label class="field"><span class="label">金额 (¥)</span><input class="input" value="50"></label>
    <label class="field"><span class="label">备注</span><input class="input" placeholder="操作备注（可选）"></label>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" data-close>取消</button><button class="btn btn-acc" data-close data-toast="ok" data-toast-title="余额已调整">确认</button></div>
</div></div>
<script>window.PAGE={shell:'admin',active:'/admin/users',title:'用户管理',idx:'ADMIN / USERS'}</script>
<script src="assets/shell.js"></script>
</body>
</html>
