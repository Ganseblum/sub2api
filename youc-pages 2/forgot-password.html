<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>忘记密码 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="auth-brand"><span class="mark" style="width:34px;height:34px;display:grid;place-items:center;font-weight:900;font-size:13px;background:var(--ink);color:var(--bg);border:2.5px solid var(--line)">YC</span><b style="font-size:18px;letter-spacing:.5px">YOUC</b></div>
      <h1>找回密码</h1>
      <p>输入注册邮箱，我们会发送重置链接</p>
    </div>
    <div class="auth-body">
      <label class="field"><span class="label">邮箱</span><input class="input" type="email" placeholder="请输入邮箱"></label>
      <a class="btn btn-fill btn-block btn-lg" href="reset-password.html">发送重置链接</a>
    </div>
    <div class="auth-foot"><a href="login.html" style="border-bottom:2px solid var(--accent);font-weight:700">← 返回登录</a></div>
  </div>
</div>
</body>
</html>
