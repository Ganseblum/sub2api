<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登录 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="auth-brand"><span class="mark" style="width:34px;height:34px;display:grid;place-items:center;font-weight:900;font-size:13px;background:var(--ink);color:var(--bg);border:2.5px solid var(--line)">YC</span><b style="font-size:18px;letter-spacing:.5px">YOUC</b></div>
      <h1>欢迎回来</h1>
      <p>登录您的账户以继续</p>
    </div>
    <div class="auth-body">
      <label class="field"><span class="label">邮箱</span><input class="input" type="email" placeholder="请输入邮箱" value="dev@youc.io"></label>
      <label class="field"><span class="label">密码</span><input class="input" type="password" placeholder="请输入密码" value="••••••••"></label>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <label class="checkrow"><input type="checkbox" checked> 记住我</label>
        <a href="forgot-password.html" style="font-size:12.5px;border-bottom:2px solid var(--accent)">忘记密码？</a>
      </div>
      <a class="btn btn-fill btn-block btn-lg" href="user-dashboard.html">登录</a>
      <div class="divider">或</div>
      <div class="oauth-row">
        <button class="btn">GitHub</button><button class="btn">Google</button><button class="btn">微信</button>
      </div>
    </div>
    <div class="auth-foot">还没有账户？ <a href="register.html" style="border-bottom:2px solid var(--accent);font-weight:700">注册</a></div>
  </div>
</div>
</body>
</html>
