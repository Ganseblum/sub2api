<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>注册 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="auth-brand"><span class="mark" style="width:34px;height:34px;display:grid;place-items:center;font-weight:900;font-size:13px;background:var(--ink);color:var(--bg);border:2.5px solid var(--line)">YC</span><b style="font-size:18px;letter-spacing:.5px">YOUC</b></div>
      <h1>创建账户</h1>
      <p>注册以开始使用 YOUC</p>
    </div>
    <div class="auth-body">
      <label class="field"><span class="label">邮箱</span><input class="input" type="email" placeholder="请输入邮箱"></label>
      <label class="field"><span class="label">密码</span><input class="input" type="password" placeholder="创建一个安全的密码"><span class="hint">至少 6 个字符</span></label>
      <label class="field"><span class="label">邀请码 (可选)</span><input class="input" placeholder="如有邀请码请填写"></label>
      <label class="checkrow" style="margin-bottom:18px"><input type="checkbox"> 我已阅读并同意 <a href="legal.html" style="border-bottom:2px solid var(--accent)">服务条款</a></label>
      <a class="btn btn-acc btn-block btn-lg" href="email-verify.html">注册</a>
      <div class="divider">或使用第三方</div>
      <div class="oauth-row"><button class="btn">GitHub</button><button class="btn">Google</button><button class="btn">LinuxDo</button></div>
    </div>
    <div class="auth-foot">已有账户？ <a href="login.html" style="border-bottom:2px solid var(--accent);font-weight:700">登录</a></div>
  </div>
</div>
</body>
</html>
