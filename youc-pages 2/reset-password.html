<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>重置密码 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="auth-brand"><span class="mark" style="width:34px;height:34px;display:grid;place-items:center;font-weight:900;font-size:13px;background:var(--ink);color:var(--bg);border:2.5px solid var(--line)">YC</span><b style="font-size:18px;letter-spacing:.5px">YOUC</b></div>
      <h1>设置新密码</h1>
      <p>为账户设置一个新的安全密码</p>
    </div>
    <div class="auth-body">
      <label class="field"><span class="label">新密码</span><input class="input" type="password" placeholder="输入新密码"><span class="hint">至少 6 个字符</span></label>
      <label class="field"><span class="label">确认新密码</span><input class="input" type="password" placeholder="再次输入新密码"></label>
      <a class="btn btn-acc btn-block btn-lg" href="login.html">重置密码</a>
    </div>
    <div class="auth-foot"><a href="login.html" style="border-bottom:2px solid var(--accent);font-weight:700">← 返回登录</a></div>
  </div>
</div>
</body>
</html>
