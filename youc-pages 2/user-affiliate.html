<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>邀请返利 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header id="topbar"></header>
    <div class="content">
      <div class="page-head"><div><h1>邀请返利</h1><p>分享你的邀请链接，好友消费即可获得返利</p></div>
        <button class="btn btn-acc" data-open="withdraw">提取返利</button></div>

      <div class="stats" style="margin-bottom:22px">
        <div class="stat"><div class="n">28</div><div class="l">累计邀请</div></div>
        <div class="stat"><div class="n">19</div><div class="l">有效用户</div></div>
        <div class="stat"><div class="n">¥426.80</div><div class="l">累计返利</div></div>
        <div class="stat"><div class="n">¥138.20</div><div class="l">可提取</div></div>
      </div>

      <div class="card card-pad" style="margin-bottom:22px">
        <div class="section-title" style="margin-top:0">我的邀请链接</div>
        <div class="toolbar"><input class="input mono" style="max-width:520px" value="https://youc.io/register?ref=JD8842"><button class="btn btn-fill" data-toast="ok" data-toast-title="链接已复制">复制</button></div>
        <p class="hint">返利比例：好友每笔消费的 10% 将计入你的可提取返利。</p>
      </div>

      <div class="section-title">返利明细</div>
      <div class="table-wrap"><table class="table">
        <thead><tr><th>时间</th><th>来源用户</th><th>消费金额</th><th>返利</th><th>状态</th></tr></thead>
        <tbody>
          <tr><td class="mono">06-20</td><td class="mono">u***82</td><td class="mono">¥99.00</td><td class="mono">¥9.90</td><td><span class="badge b-ok">已入账</span></td></tr>
          <tr><td class="mono">06-18</td><td class="mono">u***45</td><td class="mono">¥299.00</td><td class="mono">¥29.90</td><td><span class="badge b-ok">已入账</span></td></tr>
          <tr><td class="mono">06-15</td><td class="mono">u***10</td><td class="mono">¥39.00</td><td class="mono">¥3.90</td><td><span class="badge b-warn">结算中</span></td></tr>
        </tbody>
      </table></div>
    </div>
  </div>
</div>
<div class="overlay" id="withdraw">
  <div class="modal">
    <div class="modal-head"><h3>提取返利</h3><span class="modal-x" data-close>×</span></div>
    <div class="modal-body">
      <div class="kv"><span class="k">可提取余额</span><b style="font-size:18px">¥138.20</b></div>
      <label class="field" style="margin-top:14px"><span class="label">提取金额</span><input class="input" value="138.20"></label>
      <label class="field"><span class="label">提取方式</span><select class="select"><option>转入账户余额</option><option>提现至微信</option><option>提现至支付宝</option></select></label>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" data-close>取消</button><button class="btn btn-acc" data-close data-toast="ok" data-toast-title="提取申请已提交">确认提取</button></div>
  </div>
</div>
<script>window.PAGE={shell:'user',active:'/affiliate',title:'邀请返利',idx:'USER / AFFILIATE'}</script>
<script src="assets/shell.js"></script>
</body>
</html>
