<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>个人资料 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header id="topbar"></header>
    <div class="content">
      <div class="page-head"><div><h1>个人资料</h1><p>管理账户信息、安全与绑定</p></div></div>
      <div class="tabs" style="margin-bottom:20px"><div class="tab active" data-tab="info" data-tabs="pf">基本信息</div><div class="tab" data-tab="sec" data-tabs="pf">安全</div><div class="tab" data-tab="bind" data-tabs="pf">第三方绑定</div></div>
      <div data-tabhost="pf">
        <div data-pane="info">
          <div class="grid-2">
            <div class="card card-pad">
              <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px"><div class="avatar" style="width:56px;height:56px;font-size:20px">JD</div><div><b style="font-size:16px">John Doe</b><p class="hint">UID · 8842 · 注册于 2026-03-01</p></div></div>
              <label class="field"><span class="label">昵称</span><input class="input" value="John Doe"></label>
              <label class="field"><span class="label">邮箱</span><input class="input" value="dev@youc.io" disabled></label>
              <button class="btn btn-acc" data-toast="ok" data-toast-title="资料已保存">保存修改</button>
            </div>
            <div class="card card-pad">
              <div class="section-title" style="margin-top:0">账户概览</div>
              <div class="kv"><span class="k">余额</span><b>¥86.40</b></div>
              <div class="kv"><span class="k">当前套餐</span><span class="badge b-on">Pro · 月付</span></div>
              <div class="kv"><span class="k">活跃密钥</span><b>5</b></div>
              <div class="kv"><span class="k">余额预警</span><span class="toggle on"></span></div>
            </div>
          </div>
        </div>
        <div data-pane="sec" style="display:none">
          <div class="grid-2">
            <div class="card card-pad"><div class="section-title" style="margin-top:0">修改密码</div>
              <label class="field"><span class="label">当前密码</span><input class="input" type="password"></label>
              <label class="field"><span class="label">新密码</span><input class="input" type="password"></label>
              <button class="btn btn-acc" data-toast="ok" data-toast-title="密码已更新">更新密码</button></div>
            <div class="card card-pad"><div class="section-title" style="margin-top:0">两步验证 (TOTP)</div>
              <div class="kv"><span class="k">状态</span><span class="badge b-mute">未启用</span></div>
              <p class="hint" style="margin:12px 0">启用后，登录时需输入验证器生成的动态验证码。</p>
              <button class="btn btn-fill" data-open="totp">启用 2FA</button></div>
          </div>
        </div>
        <div data-pane="bind" style="display:none">
          <div class="card card-pad">
            <div class="kv"><span><b>GitHub</b></span><button class="btn btn-sm">绑定</button></div>
            <div class="kv"><span><b>Google</b> · <span class="hint">dev@gmail.com</span></span><button class="btn btn-sm btn-ghost danger" style="color:var(--danger)">解绑</button></div>
            <div class="kv"><span><b>微信</b></span><button class="btn btn-sm">绑定</button></div>
            <div class="kv"><span><b>LinuxDo</b></span><button class="btn btn-sm">绑定</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="overlay" id="totp">
  <div class="modal">
    <div class="modal-head"><h3>启用两步验证</h3><span class="modal-x" data-close>×</span></div>
    <div class="modal-body" style="text-align:center">
      <div style="width:160px;height:160px;margin:0 auto 16px;border:2.5px solid var(--line);display:grid;place-items:center;background:repeating-conic-gradient(var(--ink) 0 25%,#fff 0 50%) 0/20px 20px">QR</div>
      <p class="hint">用验证器扫码后，输入 6 位验证码完成绑定</p>
      <input class="input mono" style="text-align:center;max-width:200px;margin:14px auto" placeholder="000000">
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" data-close>取消</button><button class="btn btn-acc" data-close data-toast="ok" data-toast-title="2FA 已启用">确认</button></div>
  </div>
</div>
<script>window.PAGE={shell:'user',active:'/profile',title:'个人资料',idx:'USER / PROFILE'}</script>
<script src="assets/shell.js"></script>
</body>
</html>
