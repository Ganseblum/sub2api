<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>兑换 · YOUC</title>
<link rel="stylesheet" href="assets/youc.css" />
</head>
<body>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header id="topbar"></header>
    <div class="content">
      <div class="page-head"><div><h1>兑换</h1><p>输入兑换码为账户充值额度或余额</p></div></div>
      <div class="grid-2">
        <div class="card card-pad">
          <div class="section-title" style="margin-top:0">兑换码</div>
          <label class="field"><span class="label">兑换码</span><input class="input mono" placeholder="XXXX-XXXX-XXXX-XXXX"></label>
          <button class="btn btn-acc btn-block btn-lg" data-toast="ok" data-toast-title="兑换成功" data-toast-msg="余额 +¥50.00">立即兑换</button>
          <p class="hint" style="margin-top:12px">兑换码区分大小写，每个兑换码仅可使用一次。</p>
        </div>
        <div class="card card-pad">
          <div class="section-title" style="margin-top:0">兑换记录</div>
          <div class="kv"><span class="k">2026-06-10</span><span>WELCOME50 · <b>+¥50.00</b></span></div>
          <div class="kv"><span class="k">2026-05-21</span><span>SPRING10 · <b>+¥10.00</b></span></div>
          <div class="kv"><span class="k">2026-04-02</span><span>NEWUSER · <b>+2M Tokens</b></span></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>window.PAGE={shell:'user',active:'/redeem',title:'兑换',idx:'USER / REDEEM'}</script>
<script src="assets/shell.js"></script>
</body>
</html>
